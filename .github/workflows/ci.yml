name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install project (with dev extras)
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Smoke-test the CLI
        run: |
          uv run yak --version
          uv run yak hello ci

      - name: Run tests
        run: uv run pytest
