# yak-tracker — sample configuration
#
# Copy this to ~/.config/yak-tracker/config.toml (or set $YAK_TRACKER_CONFIG to
# point here) and tweak. Every key is optional; anything you omit falls back to
# the built-in default. CLI flags always win over this file.
#
# Check what's actually in effect with:  yak config

# Repos to scan for git activity. ~ is expanded. Defaults to the current
# directory when unset, so set this once and skip --repo every time.
repos = ["~/code/yak-tracker", "~/code/other-project"]

# Minutes of inactivity that start a new work session (the gap that means
# "I stepped away / context-switched"). Default: 25.
idle_gap = 25

# Ollama model used to narrate `yak today`. Must be pulled locally
# (e.g. `ollama pull llama3`). Default: "llama3".
model = "llama3"

# Narration backend: "ollama" (local, default) or "openai_compat" for any
# OpenAI-compatible /v1/chat/completions endpoint (LM Studio, llama.cpp server).
# WARNING: a non-local openai_compat endpoint sends narration off-box and breaks
# the privacy guarantee. Default: "ollama".
backend = "ollama"

# Base URL for the narration backend. Unset => ollama uses ollama_host, and
# openai_compat uses http://localhost:1234/v1. openai_compat reads an optional
# API key from $YAK_LLM_API_KEY (never put secrets in this file).
# llm_base_url = "http://localhost:1234/v1"

# Where your local Ollama server lives. Point this at another box to use a
# remote Ollama on your LAN. Default: "http://localhost:11434".
ollama_host = "http://localhost:11434"

# Seconds to wait for Ollama before giving up and falling back to the raw tree.
# Default: 60.
timeout = 60

# Default persona for `yak today`: "standup", "story", or "learning".
# Override per-run with --format. Default: "story".
format = "story"

# Scrub secrets (API keys, tokens, KEY=value credentials, URL passwords) from
# shell commands before they reach the Ollama prompt or `--json` export. This is
# the privacy stance that makes yak-tracker safe to point at real history, so it
# is ON by default. Set to false (or pass --no-redact) only if you want the raw
# commands. Default: true.
redact = true

# Default notes vault for `yak today --export md` (~ is expanded). Set this once
# and you can drop the day's learning log into Obsidian with just
# `yak today --export md`; --out overrides it per run. Unset by default (so an
# export without --out errors rather than guessing a location).
# vault_path = "~/notes"

# Filename for notes written by `yak today --export md`. The only placeholder is
# {date} (YYYY-MM-DD), so the default writes e.g. 2026-06-29.md. Subdirectories
# are allowed (e.g. "daily/{date}.md") and created as needed. Default: "{date}.md".
filename_template = "{date}.md"

# --- yak post: deliver a standup/story to chat ------------------------------
# Incoming-webhook URLs for `yak post --to slack|discord`. Set the platform you
# use, then push your standup with `yak post --to slack`. Only the final,
# redacted text leaves the box, and only when you run the command. Treat a
# webhook URL as a write credential and keep it out of shared dotfiles.
# [post]
# slack = "https://hooks.slack.com/services/T000/B000/XXXX"
# discord = "https://discord.com/api/webhooks/000/XXXX"
